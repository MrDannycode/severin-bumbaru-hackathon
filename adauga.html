<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaugă Sesizare - Galați Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Harta din formular va fi puțin mai mică */
        #map-picker {
            height: 300px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ced4da;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">⬅ Înapoi la Hartă</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">Raportează o problemă nouă</h4>
                    </div>
                    <div class="card-body">
                        <form id="form-sesizare">

                            <div id="sectiune-detalii">
                                <div class="mb-3">
                                    <label for="titlu" class="form-label">Titlu sesizare</label>
                                    <input type="text" class="form-control" id="titlu"
                                        placeholder="Ex: Groapă periculoasă, Iluminat stradal defect..." required>
                                </div>

                                <div class="mb-3">
                                    <label for="categorie" class="form-label">Categorie</label>
                                    <select class="form-select" id="categorie" required>
                                        <option value="">Alege o categorie...</option>
                                        <option value="infrastructura">Infrastructură (Gropi, Asfalt)</option>
                                        <option value="curatenie">Curățenie și Gunoi</option>
                                        <option value="iluminat">Iluminat Public</option>
                                        <option value="parcuri">Parcuri și Spații Verzi</option>
                                        <option value="altele">Altele</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="descriere" class="form-label">Descriere detaliată</label>
                                    <textarea class="form-control" id="descriere" rows="3"
                                        placeholder="Oferă mai multe detalii despre problemă..." required></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Fotoș (opțional)</label>
                                    <div class="d-flex gap-2 mb-2">
                                        <label class="btn btn-outline-primary flex-fill mb-0" for="poza-upload">
                                            📂 Încarcă poză
                                            <input type="file" id="poza-upload" accept="image/*" class="d-none">
                                        </label>
                                        <label class="btn btn-outline-success flex-fill mb-0" for="poza-camera">
                                            📷 Fați o poză
                                            <input type="file" id="poza-camera" accept="image/*" capture="environment" class="d-none">
                                        </label>
                                    </div>
                                    <div id="preview-container" class="d-none">
                                        <img id="poza-preview" src="" alt="Preview" class="img-fluid rounded border" style="max-height: 200px;">
                                        <button type="button" class="btn btn-sm btn-outline-danger mt-1" id="btn-sterge-poza">✕ Șterge poza</button>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-secondary w-100" id="btn-mergi-la-harta">Următorul
                                    pas: Alege Locația 🗺️</button>
                            </div>

                            <div id="sectiune-harta" class="d-none">
                                <button type="button" class="btn btn-outline-secondary btn-sm mb-3"
                                    id="btn-inapoi-la-detalii">⬅ Înapoi la Detalii</button>

                                <div class="mb-4">
                                    <label class="form-label fw-bold text-primary">Alege locația pe hartă (Click pe
                                        hartă)</label>
                                    <div id="map-picker"></div>

                                    <div class="row mt-2">
                                        <div class="col">
                                            <input type="text" class="form-control form-control-sm" id="latitudine"
                                                placeholder="Latitudine" readonly>
                                        </div>
                                        <div class="col">
                                            <input type="text" class="form-control form-control-sm" id="longitudine"
                                                placeholder="Longitudine" readonly>
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">Trimite Sesizarea</button>

                                <div id="mesaj-succes" class="alert alert-success d-none mt-3 text-center" role="alert">
                                    ✅ Sesizarea a fost înregistrată cu succes!
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inițializăm harta pe Galați
        var mapPicker = L.map('map-picker').setView([45.4353, 28.0073], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapPicker);

        var marker;

        // 2. Punem pin-ul la click
        mapPicker.on('click', function (e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(mapPicker);
            }

            document.getElementById('latitudine').value = lat.toFixed(6);
            document.getElementById('longitudine').value = lng.toFixed(6);
        });

        // ==========================================
        // 3. LOGICA PENTRU ASCUNDERE/AFIȘARE SECȚIUNI
        // ==========================================
        const sectiuneDetalii = document.getElementById('sectiune-detalii');
        const sectiuneHarta = document.getElementById('sectiune-harta');
        const btnMergiLaHarta = document.getElementById('btn-mergi-la-harta');
        const btnInapoiLaDetalii = document.getElementById('btn-inapoi-la-detalii');

        // Când apăsăm "Următorul pas"
        btnMergiLaHarta.addEventListener('click', function () {
            sectiuneDetalii.classList.add('d-none'); // Ascundem textele
            sectiuneHarta.classList.remove('d-none'); // Afișăm harta

            // Spunem hărții să se redeseneze corect acum că e vizibilă
            setTimeout(function () {
                mapPicker.invalidateSize();
            }, 100);
        });

        // Când apăsăm "Înapoi"
        btnInapoiLaDetalii.addEventListener('click', function () {
            sectiuneHarta.classList.add('d-none'); // Ascundem harta
            sectiuneDetalii.classList.remove('d-none'); // Afișăm textele
        });
    </script>

    <!-- Salvare sesizare în Firestore -->
    <script type="module">
        import { db, auth, storage } from './js/firebase.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Preview poză — funcționează pentru ambele inputuri
        let fisierSelectat = null;

        function handleFileSelect(file) {
            if (!file) return;
            fisierSelectat = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('poza-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('d-none');
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('poza-upload').addEventListener('change', (e) => handleFileSelect(e.target.files[0]));
        document.getElementById('poza-camera').addEventListener('change', (e) => handleFileSelect(e.target.files[0]));

        document.getElementById('btn-sterge-poza').addEventListener('click', () => {
            fisierSelectat = null;
            document.getElementById('poza-upload').value = '';
            document.getElementById('poza-camera').value = '';
            document.getElementById('preview-container').classList.add('d-none');
        });

        // Submit formular
        document.getElementById('form-sesizare').addEventListener('submit', async function (e) {
            e.preventDefault();

            const titlu = document.getElementById('titlu').value.trim();
            const categorie = document.getElementById('categorie').value;
            const descriere = document.getElementById('descriere').value.trim();
            const lat = document.getElementById('latitudine').value;
            const lng = document.getElementById('longitudine').value;

            if (!lat || !lng) {
                alert('Te rugăm să alegi o locație pe hartă!');
                return;
            }

            const btnSubmit = document.querySelector('button[type="submit"]');
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Se trimite...';

            try {
                // Upload poză dacă există
                let pozaURL = null;
                if (fisierSelectat) {
                    const storageRef = ref(storage, `sesizari/${Date.now()}_${fisierSelectat.name}`);
                    const snapshot = await uploadBytes(storageRef, fisierSelectat);
                    pozaURL = await getDownloadURL(snapshot.ref);
                }

                await addDoc(collection(db, 'Sesizari'), {
                    titlu: titlu,
                    categorie: categorie,
                    descriere: descriere,
                    latitudine: parseFloat(lat),
                    longitudine: parseFloat(lng),
                    status: 'nou',
                    pozaURL: pozaURL,
                    creatDe: auth.currentUser ? auth.currentUser.uid : 'anonim',
                    creatLa: serverTimestamp()
                });

                document.getElementById('mesaj-succes').classList.remove('d-none');
                document.getElementById('form-sesizare').reset();
                fisierSelectat = null;
                document.getElementById('preview-container').classList.add('d-none');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (error) {
                alert('Eroare la trimiterea sesizării: ' + error.message);
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Trimite Sesizarea';
            }
        });
    </script>

</body>

</html>
