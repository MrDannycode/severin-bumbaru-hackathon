<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiune Sesizări Galați</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">Galați Report ⚓</a>
            <div>
                <a href="adauga.html" class="btn btn-light btn-sm">Adaugă Sesizare</a>
                <a href="admin.html" class="btn btn-outline-light btn-sm">Admin</a>
                <button class="btn btn-outline-light btn-sm ms-2" id="btnLogin" data-bs-toggle="modal"
                    data-bs-target="#loginModal">Login</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div id="map" style="height: 500px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
            </div>

            <div class="col-md-4">
                <h4 class="mb-3">Sesizări Recente</h4>
                <div id="lista-sesizari">
                    <div class="card mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Groapă pe strada Brăilei</h5>
                            <span class="badge bg-warning text-dark mb-2">În lucru</span>
                            <p class="card-text text-muted small">Categorie: Infrastructură</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="loginModalLabel">Autentificare Galați Report</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-auth">
                        <div class="mb-3">
                            <label for="emailAuth" class="form-label">Adresă de Email</label>
                            <input type="email" class="form-control" id="emailAuth" placeholder="nume@exemplu.com"
                                required>
                        </div>
                        <div class="mb-4">
                            <label for="parolaAuth" class="form-label">Parolă</label>
                            <input type="password" class="form-control" id="parolaAuth" placeholder="Introdu parola"
                                required>
                        </div>
                        <div id="auth-mesaj" class="alert d-none mb-2" role="alert"></div>
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-primary" id="btn-intra-cont">Intră în cont
                                (Login)</button>
                            <button type="button" class="btn btn-outline-secondary" id="btn-creeaza-cont">Creează cont
                                nou (Register)</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/map.js"></script>

    <script type="module">
        import { inregistrare, logare } from './js/auth.js';

        function afiseazaMesaj(text, tip = 'danger') {
            const div = document.getElementById('auth-mesaj');
            div.textContent = text;
            div.className = `alert alert-${tip}`;
        }

        document.getElementById('btn-intra-cont').addEventListener('click', async () => {
            const email = document.getElementById('emailAuth').value.trim();
            const parola = document.getElementById('parolaAuth').value;
            if (!email || !parola) { afiseazaMesaj('Completează email-ul și parola!'); return; }
            const result = await logare(email, parola);
            if (result.success) {
                afiseazaMesaj('Logare reușită! 🎉', 'success');
                setTimeout(() => bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide(), 1200);
            } else {
                afiseazaMesaj('Eroare: ' + result.message);
            }
        });

        document.getElementById('btn-creeaza-cont').addEventListener('click', async () => {
            const email = document.getElementById('emailAuth').value.trim();
            const parola = document.getElementById('parolaAuth').value;
            if (!email || !parola) { afiseazaMesaj('Completează email-ul și parola!'); return; }
            if (parola.length < 6) { afiseazaMesaj('Parola trebuie să aibă minim 6 caractere!'); return; }
            const result = await inregistrare(email, parola);
            if (result.success) {
                afiseazaMesaj('Cont creat cu succes! 🎉 Acum poți intra în cont.', 'success');
            } else {
                afiseazaMesaj('Eroare: ' + result.message);
            }
        });
    </script>
</body>

</html>
