<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cetățean – CityFix Galați</title>
    <meta name="description" content="Autentifică-te sau creează un cont pentru a raporta probleme urbane în Galați.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cont.css">
    <link rel="stylesheet" href="css/citizen.css">
</head>

<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar-custom">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="d-flex align-items-center gap-2 text-decoration-none" href="index.html">
                <span class="nav-brand-icon">⚓</span>
                <span class="navbar-brand-text">CityFix Galați</span>
            </a>
            <div class="d-flex align-items-center gap-1">
                <a href="index.html" class="nav-link-custom">Acasă</a>
                <a href="admin.html" class="nav-link-custom nav-link-admin d-none" id="btnAdmin">Admin</a>
                <button class="btn-nav-login ms-2" id="btnLogin">⚙ Cont</button>
            </div>
        </div>
    </nav>

    <div class="cont-wrapper">


        <!-- ══════════════════════════════════
         DASHBOARD CETĂȚEAN
         Afișat când utilizatorul e logat
    ══════════════════════════════════ -->
        <div id="sectiune-dashboard" class="dashboard-container">

            <!-- Profil header -->
            <div class="dash-profile-card">
                <div class="dash-avatar" id="dash-avatar">👤</div>
                <div class="dash-profile-info">
                    <div class="dash-name" id="dash-email">—</div>
                    <div class="dash-role-badge" id="dash-role-badge">
                        <span>🏷️</span>
                        <span id="dash-role-text">Cetățean</span>
                    </div>
                    <div class="dash-since" id="dash-since">Cont activ</div>
                </div>
                <button class="btn-dash-logout" id="btn-logout" onclick="doLogout()">
                    🚪 Delogare
                </button>
            </div>

            <!-- Stats rapide -->
            <div class="dash-stats-row">
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">📋</div>
                    <div class="dash-stat-val" id="stat-total">—</div>
                    <div class="dash-stat-lbl">Sesizări trimise</div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">✅</div>
                    <div class="dash-stat-val" id="stat-rezolvate">—</div>
                    <div class="dash-stat-lbl">Rezolvate</div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">🔧</div>
                    <div class="dash-stat-val" id="stat-in-lucru">—</div>
                    <div class="dash-stat-lbl">În lucru</div>
                </div>
                <div class="dash-stat-card">
                    <div class="dash-stat-icon">🔴</div>
                    <div class="dash-stat-val" id="stat-noi">—</div>
                    <div class="dash-stat-lbl">În așteptare</div>
                </div>
            </div>

            <!-- Acțiuni rapide -->
            <div class="dash-actions">
                <a href="index.html" class="dash-action-btn primary">
                    <span>📋</span>
                    <div>
                        <div class="dash-action-title">Adaugă Sesizare</div>
                        <div class="dash-action-sub">Raportează o problemă rapidă</div>
                    </div>
                </a>
                <a href="adauga.html" class="dash-action-btn secondary">
                    <span>✏️</span>
                    <div>
                        <div class="dash-action-title">Sesizare Detaliată</div>
                        <div class="dash-action-sub">Formular complet cu poze</div>
                    </div>
                </a>
            </div>

            <!-- Sesizările mele -->
            <div class="dash-section">
                <div class="dash-section-hdr">
                    <span>📋 Sesizările mele</span>
                    <span class="dash-section-count" id="count-sesizari">0</span>
                </div>
                <div id="my-sesizari-list">
                    <div class="dash-loading">
                        <div class="spinner-border spinner-border-sm dash-spinner" role="status"></div>
                        <span>Se încarcă sesizările...</span>
                    </div>
                </div>
            </div>

        </div><!-- /sectiune-dashboard -->

    </div><!-- /cont-wrapper -->

    <!-- ════ SCRIPTS ════ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/cont.js"></script>

</body>

</html>
