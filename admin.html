<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Galați Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🛡️ Panou Administrare - Galați</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Înapoi la Hartă</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h4 class="mb-3">Gestionare Sesizări</h4>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sesizare</th>
                                        <th>Categorie</th>
                                        <th>Status Curent</th>
                                        <th>Actualizează Status</th>
                                        <th>Acțiuni</th>
                                    </tr>
                                </thead>
                                <tbody id="tabel-sesizari">
                                    <tr id="rand-loading">
                                        <td colspan="5" class="text-center text-muted py-4">
                                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                            Se încarcă sesizările...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Protecție pagină: doar adminii pot accesa -->
    <script type="module">
        import { auth } from './js/firebase.js';
        import { obtineRolUtilizator } from './js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { db } from './js/firebase.js';
        import { collection, onSnapshot, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const statusLabel = {
            'nou': '<span class="badge bg-primary">Nou</span>',
            'in_lucru': '<span class="badge bg-warning text-dark">În lucru</span>',
            'rezolvat': '<span class="badge bg-success">Rezolvat</span>',
            'respins': '<span class="badge bg-danger">Respins</span>'
        };

        const categorieLabel = {
            'infrastructura': 'Infrastructură',
            'curatenie': 'Curățenie și Gunoi',
            'iluminat': 'Iluminat Public',
            'parcuri': 'Parcuri și Spații Verzi',
            'altele': 'Altele'
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const rol = await obtineRolUtilizator(user.uid);
            if (rol !== 'admin') {
                alert('Acces interzis! Această pagină este disponibilă doar pentru administratori.');
                window.location.href = 'index.html';
                return;
            }

            // Admin confirmat — încărcăm sesizările în timp real
            const q = query(collection(db, 'Sesizari'), orderBy('creatLa', 'desc'));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('tabel-sesizari');
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Nu există sesizări momentan.</td></tr>';
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const s = docSnap.data();
                    const id = docSnap.id;
                    const data = s.creatLa ? new Date(s.creatLa.seconds * 1000).toLocaleString('ro-RO') : 'N/A';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <strong>${s.titlu || '-'}</strong><br>
                            <small class="text-muted">${data}</small><br>
                            <small class="text-muted fst-italic">${s.descriere || ''}</small>
                            ${s.pozaURL ? `<br><a href="${s.pozaURL}" target="_blank"><img src="${s.pozaURL}" alt="Foto" style="max-height:60px; max-width:80px; border-radius:4px; margin-top:4px; object-fit:cover;"></a>` : ''}
                        </td>
                        <td><span class="badge bg-secondary">${categorieLabel[s.categorie] || s.categorie}</span></td>
                        <td>${statusLabel[s.status] || s.status}</td>
                        <td>
                            <select class="form-select form-select-sm" id="select-${id}">
                                <option value="nou" ${s.status === 'nou' ? 'selected' : ''}>Nou</option>
                                <option value="in_lucru" ${s.status === 'in_lucru' ? 'selected' : ''}>În lucru</option>
                                <option value="rezolvat" ${s.status === 'rezolvat' ? 'selected' : ''}>Rezolvat</option>
                                <option value="respins" ${s.status === 'respins' ? 'selected' : ''}>Respins</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-success btn-sm me-1" onclick="salveazaStatus('${id}')">Salvează</button>
                            <button class="btn btn-danger btn-sm" onclick="stergeSesizare('${id}')">Șterge</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        });

        // Funcție globală pentru salvarea statusului
        window.salveazaStatus = async (id) => {
            const select = document.getElementById('select-' + id);
            const nouStatus = select.value;
            try {
                await updateDoc(doc(db, 'Sesizari', id), { status: nouStatus });
                alert('Status actualizat cu succes!');
            } catch (err) {
                alert('Eroare: ' + err.message);
            }
        };

        // Funcție globală pentru ștergerea unei sesizări
        window.stergeSesizare = async (id) => {
            if (!confirm('Ești sigur că vrei să ștergi această sesizare? Acțiunea este ireversibilă.')) return;
            try {
                const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                await deleteDoc(doc(db, 'Sesizari', id));
            } catch (err) {
                alert('Eroare la ștergere: ' + err.message);
            }
        };
    </script>

</body>

</html>
